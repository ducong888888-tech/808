<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>情绪文案</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <nav class="category-switch" aria-label="文案分类" id="categorySwitch">
        <button class="category-btn is-active" type="button" data-category="lateNight">深夜</button>
        <button class="category-btn" type="button" data-category="work">工作</button>
        <button class="category-btn" type="button" data-category="self">自我</button>
      </nav>

      <p class="quote" id="quote"></p>
      <button class="next-btn" id="nextBtn" type="button">下一句</button>
    </main>

    <script src="script.js"></script>
  </body>
</html>
