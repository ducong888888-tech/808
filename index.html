<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>情绪文案</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="poster" aria-label="情绪文案海报">
        <p class="quote" id="quote" aria-live="polite">今夜先照顾好自己，答案会在天亮后出现。</p>
        <div class="actions" aria-label="文案操作">
          <button
            class="next-btn"
            id="nextBtn"
            type="button"
            aria-label="切换到下一句情绪文案"
          >
            下一句
          </button>
          <button
            class="next-btn"
            id="copyBtn"
            type="button"
            aria-label="复制当前文案"
          >
            复制文案
          </button>
        </div>
      </section>
    </main>
    <footer class="credit" aria-label="署名">
      <small>by 808 studio</small>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
